{% extends "base.html" %}
{% block title %}تسجيل الدخول — {{ app_name }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>تسجيل الدخول</h1>
  {% if error %}<div class="flash err" data-test="auth-error">{{ error }}</div>{% endif %}
  <form action="/login" method="post" data-test="login-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next }}">
    <label>رقم الهاتف<input type="tel" name="phone" required placeholder="07701234567" value="{{ phone }}"></label>
    <label>كلمة المرور<input type="password" name="password" required></label>
    <button class="btn btn-accent wide" type="submit" data-test="login-submit">دخول</button>
  </form>
  <p>ليس لديك حساب؟ <a href="/register">أنشئ حساباً</a></p>
</div>
{% endblock %}
