upstream souqna_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Must be >= MAX_UPLOAD_MB in .env (with a little headroom).
    client_max_body_size 12m;

    # Serve uploaded images straight from disk when using the local storage
    # backend. Falls back to the API for anything not on disk.
    location /media/ {
        alias /srv/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri @api;
    }

    location @api {
        proxy_pass http://souqna_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://souqna_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
